name: Test binary wheels on supported platforms

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with: {python-version: '3.12'}
    - uses: astral-sh/setup-uv@v2
    - name: Build wheels
      run: |
        uv build
        uv build django_litestream_vfs
        python scripts/build_binaries.py
    - name: Install and verify both packages
      run: |
        uv pip install --system \
          dist/django_litestream-*-manylinux*x86_64*.whl \
          dist/django_litestream_vfs-*-manylinux*x86_64*.whl
        which litestream && litestream version
        ls -la "$(dirname "$(which litestream)")"/litestream.so
        python -c "
        import django_litestream; print('django-litestream OK')
        import django_litestream_vfs; print('django-litestream-vfs OK')
        "

  test-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with: {python-version: '3.12'}
    - uses: astral-sh/setup-uv@v2
    - name: Build and install both packages
      run: |
        uv build
        uv build django_litestream_vfs
        python scripts/build_binaries.py
        uv pip install --system \
          dist/django_litestream-*-manylinux*aarch64*.whl \
          dist/django_litestream_vfs-*-manylinux*aarch64*.whl
        which litestream && litestream version
        ls -la "$(dirname "$(which litestream)")"/litestream.so
        python -c "
        import django_litestream; print('django-litestream OK')
        import django_litestream_vfs; print('django-litestream-vfs OK')
        "

  test-macos-x86_64:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with: {python-version: '3.12'}
    - uses: astral-sh/setup-uv@v2
    - name: Build and install both packages
      run: |
        uv build
        uv build django_litestream_vfs
        python scripts/build_binaries.py
        uv pip install --system \
          dist/django_litestream-*-macosx*x86_64*.whl \
          dist/django_litestream_vfs-*-macosx*x86_64*.whl
        which litestream && litestream version
        ls -la "$(dirname "$(which litestream)")"/litestream.dylib
        python -c "
        import django_litestream; print('django-litestream OK')
        import django_litestream_vfs; print('django-litestream-vfs OK')
        "

  test-macos-arm64:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with: {python-version: '3.12'}
    - uses: astral-sh/setup-uv@v2
    - name: Build and install both packages
      run: |
        uv build
        uv build django_litestream_vfs
        python scripts/build_binaries.py
        uv pip install --system \
          dist/django_litestream-*-macosx*arm64*.whl \
          dist/django_litestream_vfs-*-macosx*arm64*.whl
        which litestream && litestream version
        ls -la "$(dirname "$(which litestream)")"/litestream.dylib
        python -c "
        import django_litestream; print('django-litestream OK')
        import django_litestream_vfs; print('django-litestream-vfs OK')
        "
